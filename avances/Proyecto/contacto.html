<div class="overlay">
    <!-- Añadimos el fondo directamente al estilo de la tarjeta -->
    <div class="card mb-3 mx-auto"
         style="max-width: 850px; 
                background-image: url('IMG/PokePrincipal.gif'); 
                background-size: cover; 
                background-position: center; 
                border: 3px solid #ffcb05; 
                border-radius: 15px; 
                overflow: hidden;
                position: relative;"> 
        
        <!-- Una capa oscura (overlay) interna para que el texto siga siendo legible -->
        <div style="background-color: rgba(0,0,0,0.6); width: 100%; height: 100%; padding: 2rem;">
            
            <div class="card-body text-white">
                <h2 class="pokemon-font mb-4" style="font-size: 2rem; text-shadow: 2px 2px #000;">
                    ¡Contáctanos!
                </h2>
                
                <form>
                    <div class="mb-3">
                        <label class="form-label">Nombre del Entrenador</label>
                        <input type="text" class="form-control" placeholder="Escribe tu nombre" style="background: rgba(255,255,255,0.9);">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" placeholder="tu@correo.com" style="background: rgba(255,255,255,0.9);">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tu Mensaje</label>
                        <textarea class="form-control" rows="4" placeholder="¿Qué tienes en mente?" style="background: rgba(255,255,255,0.9);"></textarea>
                    </div>

                    <button type="submit" class="btn btn-pokemon w-100 p-2" style="background-color: #ffcb05; color: #3b4cca; font-weight: bold; border: none;">
                        Enviar a la PC de Bill
                    </button>
                </form>

                <div class="redes mt-4 text-center">
                    <i class="fa fa-facebook mx-2"></i>
                    <i class="fa fa-instagram mx-2"></i>
                    <i class="fa fa-twitter mx-2"></i>
                    <i class="fa fa-youtube mx-2"></i>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
